# Nexa on Render — service name "nexa" → https://nexa.onrender.com
# Repo: https://github.com/riangandhi10-cyber/nexa (app is repo root)
services:
  - type: web
    name: nexa
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_MAX_TOKENS
        value: "2500"
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CSE_ID
        sync: false
