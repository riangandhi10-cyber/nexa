<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" href="/logo.png" type="image/png">
<title>Nexa</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #181b24;
  --surface2: #1f2430;
  --border: #2a3142;
  --text: #e8eaef;
  --muted: #8b93a7;
  --accent: #6c8cff;
  --accent-dim: rgba(108, 140, 255, 0.12);
  --user-bg: #2a3555;
  --assistant-bg: #1c2029;
  --danger: #ff6b6b;
  --radius: 14px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --mono: ui-monospace, "SF Mono", Menlo, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  display: flex;
  overflow: hidden;
}
#workspace {
  flex: 1;
  display: flex;
  min-width: 0;
  overflow: hidden;
}

/* sidebar */
#sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: transform 0.25s ease;
}
#sidebar.hidden { transform: translateX(-100%); position: absolute; height: 100%; z-index: 20; }
.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  text-align: center;
}
.brand-logo {
  width: 72px;
  height: 72px;
  border-radius: 16px;
  object-fit: cover;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
}
.brand-name {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, #8ec5ff, #6c8cff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.sidebar-header h1 { display: none; }
#new-chat-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s;
}
#new-chat-btn:hover { opacity: 0.9; }
#chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.chat-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  margin-bottom: 4px;
  border: 1px solid transparent;
  transition: background 0.15s;
}
.chat-item:hover { background: var(--surface2); }
.chat-item.active {
  background: var(--accent-dim);
  border-color: rgba(108, 140, 255, 0.3);
}
.chat-item-body {
  flex: 1;
  min-width: 0;
}
.chat-item-delete {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  opacity: 0;
  transition: opacity 0.15s, background 0.15s, color 0.15s;
}
.chat-item:hover .chat-item-delete,
.chat-item-delete:focus {
  opacity: 1;
}
.chat-item-delete:hover {
  background: rgba(255, 107, 107, 0.15);
  color: var(--danger);
}
.chat-item-title {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-item-preview {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--muted);
}
#status-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--muted);
  margin-right: 6px;
}
#status-dot.online { background: #4ade80; }
#status-dot.local { background: #fbbf24; }

/* main */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
#topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.topbar-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.topbar-logo {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  object-fit: cover;
}
.topbar-name {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #8ec5ff, #6c8cff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
#menu-btn, #settings-btn, #code-toggle-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  width: 36px;
  height: 36px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}
#chat-title {
  flex: 1;
  font-size: 15px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* messages */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 8px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
#welcome {
  margin: auto;
  text-align: center;
  max-width: 480px;
  padding: 32px 20px 40px;
}
#welcome .brand-logo {
  width: 96px;
  height: 96px;
  border-radius: 20px;
  margin: 0 auto 14px;
  display: block;
}
#welcome .brand-name {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 10px;
  background: linear-gradient(135deg, #8ec5ff, #6c8cff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
#welcome h2 {
  font-size: 20px;
  font-weight: 500;
  margin-bottom: 8px;
  letter-spacing: -0.02em;
  color: var(--text);
}
.msg-avatar img {
  width: 100%;
  height: 100%;
  border-radius: 8px;
  object-fit: cover;
}
#welcome p { color: var(--muted); font-size: 15px; line-height: 1.5; }
.suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 24px;
}
.suggestion {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  transition: border-color 0.15s;
}
.suggestion:hover { border-color: var(--accent); }

.msg {
  display: flex;
  gap: 12px;
  max-width: 780px;
  width: 100%;
  margin: 0 auto;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.msg.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.msg.assistant .msg-avatar { background: var(--accent-dim); color: var(--accent); }
.msg.user .msg-avatar { background: var(--user-bg); color: #a8b8ff; }
.msg-body {
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 15px;
  line-height: 1.55;
  max-width: calc(100% - 44px);
  word-break: break-word;
}
.msg.assistant .msg-body {
  background: var(--assistant-bg);
  border: 1px solid var(--border);
}
.msg.user .msg-body {
  background: var(--user-bg);
}
.msg.error .msg-body {
  background: rgba(255, 107, 107, 0.1);
  border: 1px solid rgba(255, 107, 107, 0.3);
  color: var(--danger);
}
.msg-body p { margin: 0 0 0.6em; }
.msg-body p:last-child { margin-bottom: 0; }
.msg-body code {
  font-family: var(--mono);
  font-size: 0.88em;
  background: rgba(0,0,0,0.3);
  padding: 2px 6px;
  border-radius: 4px;
}
.msg-body pre {
  background: rgba(0,0,0,0.35);
  border-radius: 8px;
  padding: 12px;
  padding-top: 32px;
  overflow-x: auto;
  margin: 0.6em 0;
  position: relative;
}
.msg-body pre code { background: none; padding: 0; }
.msg-body ul, .msg-body ol { margin: 0.4em 0 0.6em 1.2em; }
.msg-body li { margin: 0.2em 0; }
.msg-body strong { font-weight: 600; }

.msg-images {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
  margin-top: 12px;
}
.msg-images img {
  width: 100%;
  height: 110px;
  object-fit: cover;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface2);
  cursor: pointer;
}
.msg-images img:hover { border-color: var(--accent); }
.msg-sources {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.msg-sources-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}
.msg-sources a {
  display: block;
  font-size: 12px;
  color: var(--accent);
  text-decoration: none;
  margin: 3px 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.msg-sources a:hover { text-decoration: underline; }

.thinking-label {
  font-size: 13px;
  color: var(--muted);
  padding: 14px 16px;
  background: var(--assistant-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
  display: flex;
  gap: 12px;
  max-width: 780px;
  width: 100%;
  margin: 0 auto;
}
.thinking-dots {
  display: flex;
  gap: 4px;
  padding: 14px 16px;
  background: var(--assistant-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.thinking-dots span {
  width: 7px;
  height: 7px;
  background: var(--muted);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.15s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* input */
#input-area {
  padding: 12px 16px 20px;
  background: linear-gradient(transparent, var(--bg) 20%);
}
#input-wrap {
  max-width: 780px;
  margin: 0 auto;
  display: flex;
  gap: 8px;
  align-items: flex-end;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 8px 8px 8px 16px;
  transition: border-color 0.15s;
}
#input-wrap:focus-within { border-color: var(--accent); }
#user-input {
  flex: 1;
  background: none;
  border: none;
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.4;
  resize: none;
  max-height: 160px;
  padding: 6px 0;
  outline: none;
}
#send-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  width: 40px;
  height: 40px;
  cursor: pointer;
  font-size: 18px;
  flex-shrink: 0;
  transition: opacity 0.15s;
}
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#send-btn:not(:disabled):hover { opacity: 0.9; }

/* settings modal */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#modal-overlay.open { display: flex; }
#modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  width: 100%;
  max-width: 480px;
}
#modal h3 { font-size: 18px; margin-bottom: 16px; }
#modal label {
  display: block;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 6px;
}
#system-prompt {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  padding: 10px 12px;
  resize: vertical;
  min-height: 100px;
  outline: none;
}
#system-prompt:focus { border-color: var(--accent); }
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 16px;
}
.modal-actions button {
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
}
.modal-actions button.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

#code-toggle-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

/* code playground */
#code-resizer {
  width: 4px;
  cursor: col-resize;
  background: transparent;
  flex-shrink: 0;
  transition: background 0.15s;
}
#code-resizer:hover, #code-resizer.dragging {
  background: var(--accent);
}
#code-panel {
  width: 420px;
  min-width: 280px;
  max-width: 55vw;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: none;
  flex-direction: column;
  flex-shrink: 0;
}
#code-panel.open { display: flex; }
.code-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.code-panel-header h2 {
  font-size: 14px;
  font-weight: 600;
}
.code-panel-close {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 18px;
  padding: 4px 8px;
  border-radius: 6px;
}
.code-panel-close:hover { color: var(--text); background: var(--surface2); }
.lang-tabs {
  display: flex;
  gap: 4px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}
.lang-tab {
  flex: 1;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface2);
  color: var(--muted);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.lang-tab.active {
  background: var(--accent-dim);
  border-color: rgba(108, 140, 255, 0.4);
  color: var(--accent);
}
#code-editor {
  flex: 1;
  min-height: 120px;
  margin: 0;
  padding: 12px 14px;
  border: none;
  border-bottom: 1px solid var(--border);
  background: #12151c;
  color: #c9d1d9;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.5;
  resize: none;
  outline: none;
  tab-size: 2;
}
.code-toolbar {
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}
.code-toolbar button {
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
}
#code-run-btn {
  background: #22c55e;
  border-color: #22c55e;
  color: #fff;
}
#code-run-btn:hover { opacity: 0.9; }
#code-run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.code-output-wrap {
  flex: 1;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.code-output-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 8px 12px 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.output-actions {
  display: flex;
  gap: 6px;
}
.output-actions button {
  padding: 3px 8px;
  font-size: 11px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
}
.output-actions button:hover {
  border-color: var(--accent);
  color: var(--accent);
}
#code-output {
  flex: 1;
  overflow: auto;
  padding: 8px 12px 12px;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.5;
  color: #a8b8c8;
  white-space: pre-wrap;
  word-break: break-word;
}
#code-output:empty::before {
  content: 'Output will appear here…';
  color: var(--muted);
}
#code-output.error { color: var(--danger); }
#html-preview {
  flex: 1;
  min-height: 120px;
  border: none;
  background: #fff;
  display: none;
}
#html-preview.show { display: block; }

#fullscreen-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: #0a0a0c;
  flex-direction: column;
}
#fullscreen-overlay.open { display: flex; }
.fullscreen-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.fullscreen-bar span { font-size: 14px; font-weight: 500; }
.fullscreen-bar-actions { display: flex; gap: 8px; }
.fullscreen-bar button {
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
}
.fullscreen-bar button.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
#fullscreen-frame {
  flex: 1;
  width: 100%;
  border: none;
  background: #fff;
  display: none;
}
#fullscreen-frame.show { display: block; }
#fullscreen-text {
  flex: 1;
  margin: 0;
  padding: 20px;
  overflow: auto;
  font-family: var(--mono);
  font-size: 14px;
  line-height: 1.5;
  color: #c9d1d9;
  white-space: pre-wrap;
  display: none;
}
#fullscreen-text.show { display: block; }

.code-to-playground {
  position: absolute;
  top: 6px;
  right: 6px;
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 600;
  border: 1px solid var(--accent);
  border-radius: 6px;
  background: var(--accent-dim);
  color: var(--accent);
  cursor: pointer;
  opacity: 0.85;
  z-index: 2;
  transition: opacity 0.15s, background 0.15s;
}
.code-to-playground:hover {
  opacity: 1;
  background: var(--accent);
  color: #fff;
}
.msg-body pre:hover .code-to-playground { opacity: 1; }

@media (max-width: 900px) {
  #code-panel.open {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    z-index: 30;
    width: min(100%, 420px);
    box-shadow: -8px 0 32px rgba(0,0,0,0.4);
  }
}
@media (max-width: 640px) {
  #sidebar { position: absolute; height: 100%; z-index: 20; }
  #sidebar:not(.open) { transform: translateX(-100%); }
  .chat-item-delete { opacity: 0.7; }
}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="sidebar-header">
    <div class="brand">
      <img src="/logo.png" alt="Nexa logo" class="brand-logo">
      <div class="brand-name">Nexa</div>
    </div>
    <button id="new-chat-btn">+ New chat</button>
  </div>
  <div id="chat-list"></div>
  <div class="sidebar-footer">
    <span id="status-dot"></span>
    <span id="status-text">Checking…</span>
  </div>
</aside>

<div id="workspace">
<main id="main">
  <header id="topbar">
    <button id="menu-btn" title="Chats">☰</button>
    <div class="topbar-brand">
      <img src="/logo.png" alt="Nexa logo" class="topbar-logo">
      <span class="topbar-name">Nexa</span>
    </div>
    <span id="chat-title">New chat</span>
    <button id="code-toggle-btn" title="Code playground">&lt;/&gt;</button>
    <button id="settings-btn" title="Settings">⚙</button>
  </header>

  <div id="messages">
    <div id="welcome">
      <img src="/logo.png" alt="Nexa logo" class="brand-logo">
      <div class="brand-name">Nexa</div>
      <h2>What can I help with?</h2>
      <p>Ask anything — I'll search the web, find images, and give you detailed answers.</p>
      <div class="suggestions">
        <button class="suggestion" data-prompt="Explain quantum computing in simple terms">Explain quantum computing</button>
        <button class="suggestion" data-prompt="Write a Python function to check if a string is a palindrome">Python palindrome checker</button>
        <button class="suggestion" data-prompt="Give me 5 creative startup ideas for 2026">Startup ideas</button>
        <button class="suggestion" data-prompt="Help me plan a week-long trip to Japan">Plan a Japan trip</button>
      </div>

  <div id="input-area">
    <div id="input-wrap">
      <textarea id="user-input" rows="1" placeholder="Message Nexa…" autofocus></textarea>
      <button id="send-btn" title="Send">↑</button>
    </div>
  </div>
</main>

<div id="code-resizer"></div>

<aside id="code-panel">
  <div class="code-panel-header">
    <h2>Code Playground</h2>
    <button class="code-panel-close" id="code-panel-close" title="Close">×</button>

  <div class="lang-tabs">

    <button class="lang-tab" data-lang="python">Python</button>
    <button class="lang-tab" data-lang="html">HTML</button>
  </div>
  <textarea id="code-editor" spellcheck="false" placeholder="// Write code here and click Run"></textarea>
  <div class="code-toolbar">
    <button id="code-run-btn">▶ Run</button>
    <button id="code-fullscreen-btn" title="Fullscreen preview">⛶ Fullscreen</button>
    <button id="code-download-btn" title="Download as file">↓ Download</button>
    <button id="code-clear-btn">Clear</button>
  </div>
  <div class="code-output-wrap">
    <div class="code-output-label">
      <span id="code-output-label">Output</span>
      <div class="output-actions">
        <button type="button" id="output-fullscreen-btn">⛶</button>
        <button type="button" id="output-download-btn">↓</button>
      </div>

    <div id="code-output"></div>
    <iframe id="html-preview" sandbox="allow-scripts allow-same-origin allow-modals" title="HTML preview"></iframe>

</div>

<div id="fullscreen-overlay">

    <span id="fullscreen-title">Preview</span>
    <div class="fullscreen-bar-actions">
      <button type="button" id="fullscreen-download-btn" class="primary">↓ Download file</button>
      <button type="button" id="fullscreen-close-btn">✕ Close</button>
    </div>

  <iframe id="fullscreen-frame" sandbox="allow-scripts allow-same-origin allow-modals" title="Fullscreen preview"></iframe>
  <pre id="fullscreen-text"></pre>

<div id="modal-overlay">
  <div id="modal">
    <h3>Settings</h3>
    <label for="system-prompt">System prompt (leave blank for default)</label>
    <textarea id="system-prompt" placeholder="Leave empty to use the default helpful assistant prompt"></textarea>
    <button type="button" id="reset-prompt" style="margin-top:8px;background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px">Reset to default</button>
    <div class="modal-actions">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-save" class="primary">Save</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'ai-chatbot-v2';
const NEXA_LOGO = '/logo.png';
const WELCOME_HTML = `<div id="welcome">
  <img src="${NEXA_LOGO}" alt="Nexa logo" class="brand-logo">
  <div class="brand-name">Nexa</div>
  <h2>What can I help with?</h2>
  <p>Ask anything — I'll search the web, find images, and give you detailed answers.</p>
  <div class="suggestions">
    <button class="suggestion" data-prompt="Explain quantum computing in simple terms">Explain quantum computing</button>
    <button class="suggestion" data-prompt="Write a Python function to check if a string is a palindrome">Python palindrome checker</button>
    <button class="suggestion" data-prompt="Give me 5 creative startup ideas for 2026">Startup ideas</button>
    <button class="suggestion" data-prompt="Help me plan a week-long trip to Japan">Plan a Japan trip</button>
  </div>
</div>`;

if (location.protocol === 'file:') {
  document.body.innerHTML =
    '<div style="padding:40px;font-family:sans-serif;max-width:520px;margin:auto;color:#e8eaef;background:#0f1117;min-height:100vh">' +
    '<h2>Open via the server</h2>' +
    '<p>Do not open index.html directly. Run <code>./serve.sh</code> in the ai-chatbot folder, then go to:</p>' +
    '<p><strong>http://127.0.0.1:8090</strong></p></div>';
  throw new Error('file protocol');
}
let chats = [];
let activeId = null;
let busy = false;
let aiMode = 'local';
let systemPrompt = '';

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

let playgroundOpen = false;
let playgroundLang = 'javascript';
let playgroundCodeByLang = { javascript: '', python: '', html: '' };
let pyodideReady = null;

const CODE_SAMPLES = {
  javascript: `// Try JavaScript\nconst nums = [1, 2, 3, 4, 5];\nconst doubled = nums.map(n => n * 2);\nconsole.log('Doubled:', doubled);\nconsole.log('Sum:', doubled.reduce((a, b) => a + b, 0));`,
  python: `# Try Python\nnums = [1, 2, 3, 4, 5]\ndoubled = [n * 2 for n in nums]\nprint('Doubled:', doubled)\nprint('Sum:', sum(doubled))`,
  html: `<!DOCTYPE html>\n<html>\n<head>\n  <style>\n    body { font-family: sans-serif; padding: 20px; }\n    button { padding: 8px 16px; cursor: pointer; }\n  </style>\n</head>\n<body>\n  <h1>Hello from Nexa!</h1>\n  <button onclick="alert('It works!')">Click me</button>\n</body>\n</html>`,
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    chats = data.chats || [];
    activeId = data.activeId || (chats[0]?.id ?? null);
    systemPrompt = data.systemPrompt || '';
    playgroundOpen = !!data.playgroundOpen;
    playgroundLang = data.playgroundLang || 'javascript';
    if (data.playgroundCodeByLang) {
      playgroundCodeByLang = { ...playgroundCodeByLang, ...data.playgroundCodeByLang };
    } else if (data.playgroundCode) {
      playgroundCodeByLang[playgroundLang] = data.playgroundCode;
    }
  } catch (e) {
    chats = [];
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    chats, activeId, systemPrompt,
    playgroundOpen, playgroundLang, playgroundCodeByLang,
  }));
}

function getPlaygroundCode() {
  return playgroundCodeByLang[playgroundLang] || CODE_SAMPLES[playgroundLang] || '';
}

function setPlaygroundCode(code) {
  playgroundCodeByLang[playgroundLang] = code;
  saveState();
}

function activeChat() {
  return chats.find(c => c.id === activeId) || null;
}

function newChat() {
  const chat = { id: uid(), title: 'New chat', messages: [], created: Date.now() };
  chats.unshift(chat);
  activeId = chat.id;
  saveState();
  render();
}

function deleteEmptyChats() {
  chats = chats.filter(c => c.messages.length > 0 || c.id === activeId);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderMarkdown(text) {
  const codeBlocks = [];
  let processed = text.replace(/```(\w*)\s*\n?([\s\S]*?)```/g, (_, lang, code) => {
    const i = codeBlocks.length;
    const langAttr = (lang || 'text').toLowerCase();
    codeBlocks.push({ lang: langAttr, code: code.trim() });
    return `\x00CODE${i}\x00`;
  });
  let html = escHtml(processed);
  codeBlocks.forEach((block, i) => {
    const escaped = escHtml(block.code);
    html = html.replace(
      `\x00CODE${i}\x00`,
      `<pre data-lang="${block.lang}"><button type="button" class="code-to-playground" data-lang="${block.lang}">▶ Run</button><code>${escaped}</code></pre>`
    );
  });
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  return '<p>' + html + '</p>';
}

function proxyImage(url) {
  return '/api/image?url=' + encodeURIComponent(url);
}

function renderAssistantExtra(msg) {
  let html = '';
  if (msg.images && msg.images.length) {
    html += '<div class="msg-images">';
    msg.images.forEach(img => {
      const src = proxyImage(img.url);
      const title = escHtml(img.title || 'Image');
      html += `<a href="${escHtml(img.url)}" target="_blank" rel="noopener">` +
        `<img src="${src}" alt="${title}" loading="lazy" onerror="this.parentElement.style.display='none'">` +
        `</a>`;
    });
    html += '</div>';
  }
  if (msg.sources && msg.sources.length) {
    html += '<div class="msg-sources"><div class="msg-sources-label">Sources</div>';
    msg.sources.forEach(s => {
      html += `<a href="${escHtml(s.url)}" target="_blank" rel="noopener">${escHtml(s.title || s.url)}</a>`;
    });
    html += '</div>';
  }
  return html;
}

function deleteChat(id) {
  const idx = chats.findIndex(c => c.id === id);
  if (idx === -1) return;
  chats.splice(idx, 1);
  if (activeId === id) {
    activeId = chats[0]?.id ?? null;
    if (!activeId) newChat();
  }
  saveState();
  render();
}

function renderChatList() {
  const list = document.getElementById('chat-list');
  list.innerHTML = '';
  chats.forEach(chat => {
    const el = document.createElement('div');
    el.className = 'chat-item' + (chat.id === activeId ? ' active' : '');
    const last = chat.messages[chat.messages.length - 1];
    el.innerHTML =
      `<div class="chat-item-body">` +
      `<div class="chat-item-title">${escHtml(chat.title)}</div>` +
      (last ? `<div class="chat-item-preview">${escHtml(last.content.slice(0, 60))}</div>` : '') +
      `</div>` +
      `<button class="chat-item-delete" title="Delete chat" aria-label="Delete chat">×</button>`;
    el.querySelector('.chat-item-body').onclick = () => {
      activeId = chat.id;
      saveState();
      render();
    };
    el.querySelector('.chat-item-delete').onclick = e => {
      e.stopPropagation();
      deleteChat(chat.id);
    };
    list.appendChild(el);
  });
}

function renderMessages() {
  const container = document.getElementById('messages');
  const chat = activeChat();
  container.innerHTML = '';

  if (!chat || chat.messages.length === 0) {
    container.innerHTML = WELCOME_HTML;
    container.querySelectorAll('.suggestion').forEach(btn => {
      btn.onclick = () => {
        document.getElementById('user-input').value = btn.dataset.prompt;
        sendMessage();
      };
    });
    return;
  }

  chat.messages.forEach(msg => {
    const el = document.createElement('div');
    el.className = 'msg ' + msg.role;
    const avatar = msg.role === 'user'
      ? '👤'
      : `<img src="${NEXA_LOGO}" alt="Nexa">`;
    const body = msg.role === 'assistant'
      ? renderMarkdown(msg.content) + renderAssistantExtra(msg)
      : escHtml(msg.content);
    el.innerHTML =
      `<div class="msg-avatar">${avatar}</div>` +
      `<div class="msg-body">${body}</div>`;
    container.appendChild(el);
  });
  container.scrollTop = container.scrollHeight;
  bindCodeToPlaygroundButtons(container);
}

function bindCodeToPlaygroundButtons(container) {
  container.querySelectorAll('.code-to-playground').forEach(btn => {
    btn.onclick = e => {
      e.stopPropagation();
      const pre = btn.closest('pre');
      const code = pre?.querySelector('code')?.textContent || '';
      const lang = btn.dataset.lang || pre?.dataset.lang || 'javascript';
      openPlayground(lang, code);
    };
  });
}

function mapLang(lang) {
  const l = (lang || '').toLowerCase();
  if (l === 'py' || l === 'python') return 'python';
  if (l === 'html' || l === 'htm') return 'html';
  if (l === 'js' || l === 'javascript' || l === 'ts' || l === 'typescript') return 'javascript';
  return 'javascript';
}

function openPlayground(lang, code) {
  setPlaygroundOpen(true);
  setPlaygroundLang(mapLang(lang));
  const editor = document.getElementById('code-editor');
  if (code) {
    playgroundCodeByLang[playgroundLang] = code;
    editor.value = code;
    saveState();
  } else {
    editor.value = getPlaygroundCode();
  }
}

function setPlaygroundOpen(open) {
  playgroundOpen = open;
  const panel = document.getElementById('code-panel');
  const resizer = document.getElementById('code-resizer');
  const toggle = document.getElementById('code-toggle-btn');
  panel.classList.toggle('open', open);
  resizer.style.display = open ? 'block' : 'none';
  toggle.classList.toggle('active', open);
  saveState();
}

function setPlaygroundLang(lang) {
  playgroundLang = lang;
  document.querySelectorAll('.lang-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.lang === lang);
  });
  const output = document.getElementById('code-output');
  const preview = document.getElementById('html-preview');
  const labelSpan = document.getElementById('code-output-label');
  if (lang === 'html') {
    labelSpan.textContent = 'Preview';
    output.style.display = 'none';
    preview.classList.add('show');
  } else {
    labelSpan.textContent = 'Output';
    output.style.display = 'block';
    preview.classList.remove('show');
  }
  saveState();
}

function fileExtForLang(lang) {
  if (lang === 'python') return 'py';
  if (lang === 'html') return 'html';
  return 'js';
}

function downloadText(content, filename) {
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadPlaygroundFile() {
  const editor = document.getElementById('code-editor');
  const code = editor.value;
  const ext = fileExtForLang(playgroundLang);
  const name = playgroundLang === 'html' ? 'index.html' : `nexa-code.${ext}`;
  downloadText(code, name);
}

function downloadOutputFile() {
  if (playgroundLang === 'html') {
    downloadPlaygroundFile();
    return;
  }
  const out = document.getElementById('code-output').textContent;
  if (!out) return;
  downloadText(out, 'nexa-output.txt');
}

function openFullscreen(auto) {
  const overlay = document.getElementById('fullscreen-overlay');
  const frame = document.getElementById('fullscreen-frame');
  const text = document.getElementById('fullscreen-text');
  const title = document.getElementById('fullscreen-title');
  const editor = document.getElementById('code-editor');

  if (playgroundLang === 'html') {
    const html = editor.value;
    frame.srcdoc = html;
    frame.classList.add('show');
    text.classList.remove('show');
    title.textContent = 'HTML Preview — fullscreen';
  } else {
    const out = document.getElementById('code-output').textContent;
    frame.classList.remove('show');
    frame.srcdoc = '';
    text.textContent = out || editor.value;
    text.classList.add('show');
    title.textContent = playgroundLang === 'python' ? 'Python output' : 'JavaScript output';
  }
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeFullscreen() {
  document.getElementById('fullscreen-overlay').classList.remove('open');
  document.getElementById('fullscreen-frame').srcdoc = '';
  document.body.style.overflow = '';
}

function setCodeOutput(text, isError) {
  const out = document.getElementById('code-output');
  out.textContent = text;
  out.classList.toggle('error', !!isError);
}

async function ensurePyodideRuntime() {
  if (pyodideReady) return pyodideReady;
  pyodideReady = new Promise((resolve, reject) => {
    if (window.loadPyodide) {
      window.loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/' })
        .then(resolve).catch(reject);
      return;
    }
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js';
    script.onload = () => {
      window.loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/' })
        .then(resolve).catch(reject);
    };
    script.onerror = () => reject(new Error('Failed to load Python runtime'));
    document.head.appendChild(script);
  });
  return pyodideReady;
}

function formatRunArgs(args) {
  return args.map(a => {
    try {
      return typeof a === 'object' ? JSON.stringify(a) : String(a);
    } catch { return String(a); }
  }).join(' ');
}

async function runJavaScript(code) {
  const logs = [];
  const fakeConsole = {
    log: (...args) => logs.push(formatRunArgs(args)),
    error: (...args) => logs.push('Error: ' + formatRunArgs(args)),
    warn: (...args) => logs.push('Warn: ' + formatRunArgs(args)),
    info: (...args) => logs.push(formatRunArgs(args)),
  };
  try {
    const runner = new Function('console', `"use strict";\nreturn (async () => {\n${code}\n})();`);
    const result = await runner(fakeConsole);
    if (result !== undefined) logs.push('→ ' + formatRunArgs([result]));
    return { ok: true, text: logs.join('\n') || '(no output)' };
  } catch (e) {
    return { ok: false, text: e.stack || e.message || String(e) };
  }
}

async function runPythonOnServer(code) {
  const res = await fetch('/api/run', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ lang: 'python', code }),
  });
  const data = await res.json();
  if (!res.ok) return { ok: false, text: data.error || 'Server run failed' };
  return { ok: !!data.ok, text: data.output || '(no output)' };
}

async function runPythonInBrowser(code) {
  setCodeOutput('Loading Python runtime…');
  const py = await ensurePyodideRuntime();
  let output = '';
  py.setStdout({ batched: s => { output += s; } });
  py.setStderr({ batched: s => { output += s; } });
  await py.runPythonAsync(code);
  return { ok: true, text: output.trim() || '(no output)' };
}

async function runPython(code) {
  try {
    return await runPythonOnServer(code);
  } catch (e) {
    try {
      return await runPythonInBrowser(code);
    } catch (e2) {
      return { ok: false, text: (e2.message || String(e2)) + '\n(Server fallback also failed)' };
    }
  }
}

function runHtml(code) {
  const preview = document.getElementById('html-preview');
  preview.srcdoc = code;
  openFullscreen();
  return { ok: true, text: '' };
}

async function runPlaygroundCode() {
  const editor = document.getElementById('code-editor');
  const code = editor.value;
  setPlaygroundCode(code);
  const btn = document.getElementById('code-run-btn');
  btn.disabled = true;
  btn.textContent = 'Running…';
  setCodeOutput('');

  let result;
  try {
    if (playgroundLang === 'javascript') result = await runJavaScript(code);
    else if (playgroundLang === 'python') result = await runPython(code);
    else result = runHtml(code);
  } catch (e) {
    result = { ok: false, text: e.message || String(e) };
  }

  if (playgroundLang !== 'html') {
    setCodeOutput(result.text, !result.ok);
  }

  btn.disabled = false;
  btn.textContent = '▶ Run';
}

function initPlayground() {
  const editor = document.getElementById('code-editor');
  editor.value = getPlaygroundCode();
  setPlaygroundLang(playgroundLang);
  setPlaygroundOpen(playgroundOpen);

  editor.addEventListener('input', () => setPlaygroundCode(editor.value));

  document.getElementById('code-toggle-btn').onclick = () => {
    setPlaygroundOpen(!playgroundOpen);
    if (playgroundOpen) editor.value = getPlaygroundCode();
  };
  document.getElementById('code-panel-close').onclick = () => setPlaygroundOpen(false);
  document.getElementById('code-run-btn').onclick = runPlaygroundCode;
  document.getElementById('code-fullscreen-btn').onclick = () => openFullscreen();
  document.getElementById('code-download-btn').onclick = downloadPlaygroundFile;
  document.getElementById('output-fullscreen-btn').onclick = () => openFullscreen();
  document.getElementById('output-download-btn').onclick = downloadOutputFile;
  document.getElementById('fullscreen-close-btn').onclick = closeFullscreen;
  document.getElementById('fullscreen-download-btn').onclick = downloadPlaygroundFile;
  document.getElementById('fullscreen-overlay').onclick = e => {
    if (e.target.id === 'fullscreen-overlay') closeFullscreen();
  };
  document.getElementById('code-clear-btn').onclick = () => {
    setCodeOutput('');
    document.getElementById('html-preview').srcdoc = '';
    closeFullscreen();
  };

  document.querySelectorAll('.lang-tab').forEach(tab => {
    tab.onclick = () => {
      setPlaygroundCode(editor.value);
      setPlaygroundLang(tab.dataset.lang);
      editor.value = getPlaygroundCode();
    };
  });

  const resizer = document.getElementById('code-resizer');
  const panel = document.getElementById('code-panel');
  let dragging = false;
  resizer.onmousedown = () => {
    dragging = true;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  };
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const workspace = document.getElementById('workspace');
    const rect = workspace.getBoundingClientRect();
    const newWidth = rect.right - e.clientX;
    if (newWidth >= 280 && newWidth <= rect.width * 0.7) {
      panel.style.width = newWidth + 'px';
    }
  });
  window.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  editor.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      runPlaygroundCode();
    }
    if (e.key === 'Escape') closeFullscreen();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeFullscreen();
  });
}

function render() {
  const chat = activeChat();
  document.getElementById('chat-title').textContent = chat?.title || 'New chat';
  renderChatList();
  renderMessages();
}

function showThinking() {
  const container = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'thinking';
  el.id = 'thinking';
  el.innerHTML =
    '<div class="msg-avatar"><img src="' + NEXA_LOGO + '" alt="Nexa"></div>' +
    '<div class="thinking-label">Nexa is searching the web and gathering images…</div>';
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function hideThinking() {
  document.getElementById('thinking')?.remove();
}

function autoTitle(text) {
  const t = text.trim().replace(/\s+/g, ' ');
  return t.length > 36 ? t.slice(0, 36) + '…' : t;
}

async function refreshStatus() {
  try {
    const r = await fetch('/api/status', { cache: 'no-store' });
    if (r.ok) {
      const d = await r.json();
      aiMode = d.mode || 'local';
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      if (aiMode === 'openai') {
        dot.className = 'online';
        const search = d.search === 'google' ? ' · Google search' : ' · Web search';
        text.textContent = 'Connected · ' + (d.model || 'OpenAI') + search;
      } else {
        dot.className = 'local';
        text.textContent = 'No API key — add to .env';
      }
    }
  } catch (e) {
    document.getElementById('status-dot').className = 'local';
    document.getElementById('status-text').textContent = 'Server offline — run ./serve.sh';
  }
}

async function sendMessage() {
  if (busy) return;
  if (aiMode !== 'openai') {
    await refreshStatus();
    if (aiMode !== 'openai') {
      alert('AI is not connected. Run ./serve.sh in the ai-chatbot folder and make sure OPENAI_API_KEY is in .env');
      return;
    }
  }
  const input = document.getElementById('user-input');
  const text = (input.value || '').trim();
  if (!text) return;

  if (!activeChat()) newChat();
  const chat = activeChat();

  input.value = '';
  input.style.height = 'auto';

  chat.messages.push({ role: 'user', content: text });
  if (chat.title === 'New chat') chat.title = autoTitle(text);

  saveState();
  renderMessages();
  busy = true;
  document.getElementById('send-btn').disabled = true;
  showThinking();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: chat.messages,
        systemPrompt: systemPrompt || undefined,
      }),
    });
    const data = await res.json();
    hideThinking();

    if (!res.ok) {
      const el = document.createElement('div');
      el.className = 'msg error';
      el.innerHTML =
        '<div class="msg-avatar">!</div>' +
        `<div class="msg-body">${escHtml(data.error || 'Request failed')}</div>`;
      document.getElementById('messages').appendChild(el);
      return;
    }

    chat.messages.push({
      role: 'assistant',
      content: data.reply || '(no response)',
      images: data.images || [],
      sources: data.sources || [],
    });
    saveState();
    renderMessages();
  } catch (e) {
    hideThinking();
    chat.messages.pop();
    saveState();
    renderMessages();
    const el = document.createElement('div');
    el.className = 'msg error';
    el.innerHTML =
      '<div class="msg-avatar">!</div>' +
      '<div class="msg-body">Could not reach the server. Is it running?</div>';
    document.getElementById('messages').appendChild(el);
  } finally {
    busy = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

// input auto-resize
const userInput = document.getElementById('user-input');
userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
});
userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById('send-btn').onclick = sendMessage;
document.getElementById('new-chat-btn').onclick = () => {
  deleteEmptyChats();
  newChat();
  if (window.innerWidth <= 640) document.getElementById('sidebar').classList.remove('open');
};

document.getElementById('menu-btn').onclick = () => {
  document.getElementById('sidebar').classList.toggle('open');
};

document.getElementById('settings-btn').onclick = () => {
  document.getElementById('system-prompt').value = systemPrompt;
  document.getElementById('modal-overlay').classList.add('open');
};
document.getElementById('modal-cancel').onclick = () => {
  document.getElementById('modal-overlay').classList.remove('open');
};
document.getElementById('reset-prompt').onclick = () => {
  systemPrompt = '';
  document.getElementById('system-prompt').value = '';
  saveState();
};
document.getElementById('modal-save').onclick = () => {
  systemPrompt = document.getElementById('system-prompt').value.trim();
  saveState();
  document.getElementById('modal-overlay').classList.remove('open');
};
document.getElementById('modal-overlay').onclick = e => {
  if (e.target.id === 'modal-overlay') {
    document.getElementById('modal-overlay').classList.remove('open');
  }
};

loadState();
if (!activeId && chats.length) activeId = chats[0].id;
if (!activeId) newChat();
else render();
initPlayground();
refreshStatus();
</script>
</body>
</html>
